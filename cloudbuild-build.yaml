# Cloud Build configuration for contract-incentives-web (build + image push).
# Substitutions:
#   $_ENV, $_PROJECT_ID, $_REGISTRY_PROJECT, $_ARTIFACT_REPO, $_SERVICE_NAME

timeout: 1200s

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"

steps:
  - name: "alpine"
    id: "debug-env"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        echo "Cloud Build environment"
        env | sort
        echo "_ENV=${_ENV}"
        echo "_PROJECT_ID=${_PROJECT_ID}"
        echo "_REGISTRY_PROJECT=${_REGISTRY_PROJECT}"
        echo "_ARTIFACT_REPO=${_ARTIFACT_REPO}"
        echo "_SERVICE_NAME=${_SERVICE_NAME}"
        echo "BUILD_ID=${BUILD_ID}"
        echo "COMMIT_SHA=${COMMIT_SHA}"

  - name: "node:24"
    id: "validate"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -euxo pipefail
        npm ci
        npm run lint
        npm test
        npm run typecheck

  - name: "gcr.io/cloud-builders/docker"
    id: "docker-build"
    args:
      - "build"
      - "--build-arg"
      - "ENVIRONMENT=${_ENV}"
      - "-t"
      - "us-central1-docker.pkg.dev/${_REGISTRY_PROJECT}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${BUILD_ID}"
      - "-t"
      - "us-central1-docker.pkg.dev/${_REGISTRY_PROJECT}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest"
      - "-f"
      - "Dockerfile"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    id: "docker-push"
    args:
      - "push"
      - "--all-tags"
      - "us-central1-docker.pkg.dev/${_REGISTRY_PROJECT}/${_ARTIFACT_REPO}/${_SERVICE_NAME}"

substitutions:
  _ENV: "nonprod"
  _PROJECT_ID: "operon-labs-nonprod"
  _REGISTRY_PROJECT: "operon-labs-nonprod"
  _ARTIFACT_REPO: "operon-labs-docker"
  _SERVICE_NAME: "contract-incentives-web"

images:
  - "us-central1-docker.pkg.dev/${_REGISTRY_PROJECT}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${BUILD_ID}"
  - "us-central1-docker.pkg.dev/${_REGISTRY_PROJECT}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest"
